syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.spectrum.social.grpc";
option java_outer_classname = "SocialProto";

package spectrum.social;

service VoteService {
  rpc CastVote (CastVoteRequest) returns (VoteResponse);
}

message CastVoteRequest {
  string user_id = 1;
  string target_id = 2;
  string target_type = 3;
  bool is_positive = 4;
}

message VoteResponse {
  bool success = 1;
  int32 updated_likes = 2;
  int32 updated_dislikes = 3;
}

service CommentService {
  rpc PublishComment (PublishCommentRequest) returns (CommentResponse);
  rpc GetCommentsByReview (GetCommentsRequest) returns (stream CommentResponse);
  rpc DeleteComment (DeleteCommentRequest) returns (DeleteResponse);
}

message PublishCommentRequest {
  string user_id = 1;
  string review_id = 2;
  string content = 3;
}

message CommentResponse {
  string comment_id = 1;
  string user_id = 2;
  string review_id = 3;
  string content = 4;
  int64 published_at = 5;
}

message GetCommentsRequest {
  string review_id = 1;
  int32 page = 2;
}

message DeleteCommentRequest {
  string comment_id = 1;
  string requester_id = 2;
  string requester_role = 3;
}

message DeleteResponse {
  bool success = 1;
}